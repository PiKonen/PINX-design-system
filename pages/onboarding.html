<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding — PINX Design System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700&family=Inter:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../components/button.css" />
  <link rel="stylesheet" href="../components/page-indicator.css" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Work Sans', sans-serif;
    }

    /* ── Phone shell ── */
    .phone {
      width: 390px;
      height: 844px;
      background: #211e1e;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ── Status bar ── */
    .status-bar {
      height: 56px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      position: relative;
    }

    .status-bar__time {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 17px;
      color: #ffffff;
      white-space: nowrap;
    }

    .status-bar__icons {
      display: flex;
      align-items: center;
      gap: 7px;
      height: 14.5px;
    }

    .status-bar__icons img {
      display: block;
      object-fit: contain;
    }

    .status-bar__signal { width: 23.5px; height: 14px; }
    .status-bar__wifi   { width: 17px;   height: 13px; }
    .status-bar__battery{ width: 23.5px; height: 11px; }

    /* ── Nav bar ── */
    .nav-bar {
      height: 48px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-bar__title {
      font-family: 'Work Sans', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: #ffffff;
      letter-spacing: -0.4px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 201px;
    }

    /* ── Carousel wrapper ── */
    .carousel {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .carousel__track {
      display: flex;
      width: 300%;
      height: 100%;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .carousel__slide {
      width: calc(100% / 3);
      height: 100%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 46px;
      padding: 16px;
      background: #211e1e;
    }

    /* ── Illustration ── */
    .slide__illustration {
      width: 100%;
      height: 313px;
      flex-shrink: 0;
      border-radius: 8px;
      overflow: hidden;
    }

    .slide__illustration img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Text container ── */
    .slide__content {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      text-align: center;
      color: #ffffff;
    }

    .slide__title {
      font-family: 'Work Sans', sans-serif;
      font-weight: 700;
      font-size: 32px;
      line-height: normal;
      letter-spacing: -0.64px;
    }

    .slide__body {
      font-family: 'Work Sans', sans-serif;
      font-weight: 400;
      font-size: 18px;
      line-height: 1.25;
    }

    /* ── Bottom bar ── */
    .bottom-bar {
      height: 103px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: #211e1e;
    }

    .bottom-bar .btn {
      width: 100%;
    }

    /* ── Page indicator positioning within carousel slides ── */
    .slide__indicator {
      /* sits after the text content, pushed to the bottom of gap flow */
      margin-top: auto;
    }
  </style>
</head>
<body>

<div class="phone">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar__time">10:00 AM</span>
    <div class="status-bar__icons">
      <img class="status-bar__signal"
           src="https://www.figma.com/api/mcp/asset/4cb2769b-825a-4b8c-aec3-a412500e136a"
           alt="Signal" />
      <img class="status-bar__wifi"
           src="https://www.figma.com/api/mcp/asset/9ef533ee-6182-40b1-96b3-32640cb7293f"
           alt="Wi-Fi" />
      <img class="status-bar__battery"
           src="https://www.figma.com/api/mcp/asset/843c1c76-c0ef-4163-a81a-f1cc22e4b584"
           alt="Battery" />
    </div>
  </div>

  <!-- Navigation Bar -->
  <div class="nav-bar">
    <span class="nav-bar__title">Welcome</span>
  </div>

  <!-- Carousel -->
  <div class="carousel">
    <div class="carousel__track" id="carouselTrack">

      <!-- Slide 1 -->
      <div class="carousel__slide">
        <div class="slide__illustration">
          <img src="https://www.figma.com/api/mcp/asset/2075fc7b-bee0-4c04-94e7-f0bb2f3aab74"
               alt="Discover new features illustration" />
        </div>
        <div class="slide__content">
          <h2 class="slide__title">Discover new features</h2>
          <p class="slide__body">Learn how to make the most of our app with these quick tips.</p>
        </div>
        <div class="slide__indicator">
          <div class="page-indicator" aria-label="Page 1 of 3">
            <div class="page-indicator__dot page-indicator__dot--active"></div>
            <div class="page-indicator__dot"></div>
            <div class="page-indicator__dot"></div>
          </div>
        </div>
      </div>

      <!-- Slide 2 -->
      <div class="carousel__slide">
        <div class="slide__illustration">
          <img src="https://www.figma.com/api/mcp/asset/2418f53c-233c-463d-a801-89c09c951eb9"
               alt="Stay connected illustration" />
        </div>
        <div class="slide__content">
          <h2 class="slide__title">Stay connected</h2>
          <p class="slide__body">Connect with your friends and family easily.</p>
        </div>
        <div class="slide__indicator">
          <div class="page-indicator" aria-label="Page 2 of 3">
            <div class="page-indicator__dot"></div>
            <div class="page-indicator__dot page-indicator__dot--active"></div>
            <div class="page-indicator__dot"></div>
          </div>
        </div>
      </div>

      <!-- Slide 3 -->
      <div class="carousel__slide">
        <div class="slide__illustration">
          <img src="https://www.figma.com/api/mcp/asset/5ad7c94e-d6a6-4869-aeda-6d3737942e3f"
               alt="Get started illustration" />
        </div>
        <div class="slide__content">
          <h2 class="slide__title">Get started</h2>
          <p class="slide__body">Start exploring the app now.</p>
        </div>
        <div class="slide__indicator">
          <div class="page-indicator" aria-label="Page 3 of 3">
            <div class="page-indicator__dot"></div>
            <div class="page-indicator__dot"></div>
            <div class="page-indicator__dot page-indicator__dot--active"></div>
          </div>
        </div>
      </div>

    </div><!-- /.carousel__track -->
  </div><!-- /.carousel -->

  <!-- Bottom bar with button -->
  <div class="bottom-bar">
    <button class="btn" id="actionBtn">SKIP</button>
  </div>

</div><!-- /.phone -->

<script>
  const track = document.getElementById('carouselTrack');
  const btn   = document.getElementById('actionBtn');
  const slides = track.querySelectorAll('.carousel__slide');
  let current = 0;

  function goTo(index) {
    current = index;
    track.style.transform = `translateX(-${(100 / 3) * index}%)`;
    btn.textContent = current === slides.length - 1 ? 'GET STARTED' : 'SKIP';
  }

  btn.addEventListener('click', () => {
    if (current < slides.length - 1) {
      goTo(current + 1);
    }
  });

  // Touch/swipe support
  let startX = 0;
  track.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  track.addEventListener('touchend', e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) {
      if (diff > 0 && current < slides.length - 1) goTo(current + 1);
      if (diff < 0 && current > 0) goTo(current - 1);
    }
  });

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' && current < slides.length - 1) goTo(current + 1);
    if (e.key === 'ArrowLeft'  && current > 0) goTo(current - 1);
  });
</script>

</body>
</html>
