<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Indicator — PINX Design System</title>
  <link rel="stylesheet" href="button.css" />
  <link rel="stylesheet" href="page-indicator.css" />
  <style>
    body {
      font-family: 'Work Sans', sans-serif;
      background: #f5f5f5;
      padding: 48px;
      margin: 0;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #111;
    }

    p {
      color: #555;
      margin-bottom: 40px;
    }

    .variants {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .variant {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .variant__label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <h1>Page Indicator</h1>
  <p>Three variants — active dot shifts with each page.</p>

  <div class="variants">

    <div class="variant">
      <span class="variant__label">Property 1 = Default (page 1)</span>
      <div class="page-indicator">
        <div class="page-indicator__dot page-indicator__dot--active"></div>
        <div class="page-indicator__dot"></div>
        <div class="page-indicator__dot"></div>
      </div>
    </div>

    <div class="variant">
      <span class="variant__label">Property 1 = 2 (page 2)</span>
      <div class="page-indicator">
        <div class="page-indicator__dot"></div>
        <div class="page-indicator__dot page-indicator__dot--active"></div>
        <div class="page-indicator__dot"></div>
      </div>
    </div>

    <div class="variant">
      <span class="variant__label">Property 1 = 3 (page 3)</span>
      <div class="page-indicator">
        <div class="page-indicator__dot"></div>
        <div class="page-indicator__dot"></div>
        <div class="page-indicator__dot page-indicator__dot--active"></div>
      </div>
    </div>

  </div>

</body>
</html>
