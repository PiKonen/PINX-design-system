<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Button — PINX Design System</title>
  <link rel="stylesheet" href="../styles/styles.css" />
  <style>
    body {
      font-family: 'Work Sans', sans-serif;
      background: #f5f5f5;
      padding: 48px;
      margin: 0;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #111;
    }

    p {
      color: #555;
      margin-bottom: 40px;
    }

    .states {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 200px;
    }

    .state-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <h1>Button</h1>
  <p>All interactive states of the Button component.</p>

  <div class="states">
    <div>
      <div class="state-label">Default</div>
      <button class="btn">Button</button>
    </div>
    <div>
      <div class="state-label">Hover</div>
      <button class="btn" style="background-color: var(--color-primary-hover);">Button</button>
    </div>
    <div>
      <div class="state-label">Focus</div>
      <button class="btn" style="background-color: var(--color-primary-hover); border-color: var(--color-primary);">Button</button>
    </div>
    <div>
      <div class="state-label">Disabled</div>
      <button class="btn" disabled>Button</button>
    </div>
  </div>
</body>
</html>
